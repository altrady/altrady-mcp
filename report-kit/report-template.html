<!doctype html>
<!--
  Altrady report template. Self-contained, dark, branded.
  HOW TO USE (see REPORT-KIT.md): replace the {{SLOTS}} below, pour your content into
  {{BODY}} using the component snippets documented in the <style> section comments, and
  write the result to ~/altrady-reports/reports/<id>.html. Keep it self-contained — do
  NOT add external CSS/JS/CDN links. Delete this comment in the generated file.

  Slots:
    {{TITLE}}      e.g. "Morning Check"
    {{SUBTITLE}}   e.g. "Bybit · main account"  (or a market like "ETH-USDT 1h")
    {{TIMESTAMP}}  e.g. "2026-06-09 08:30"  (human readable, local)
    {{HEADLINE}}   one-line summary, e.g. "3 positions · +2.1% day · 2 alerts fired"
    {{BODY}}       the report content, built from the components below
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}} — Altrady</title>
<style>
  :root{
    --bg:#0b0e14; --surface:#121826; --surface-2:#0f1420; --line:rgba(255,255,255,.08);
    --text:#e6edf3; --muted:#8b97a8; --faint:#5b6677;
    --primary:#017aff; --primary-deep:#0068d9; --ink:#01438d;
    --pos:#16c784; --neg:#ea3943; --warn:#f0a020; --neutral:#8b97a8;
    --radius:14px; --shadow:0 1px 0 rgba(255,255,255,.04), 0 18px 40px -24px rgba(0,0,0,.8);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:radial-gradient(1200px 600px at 80% -10%, rgba(1,122,255,.10), transparent 60%),var(--bg);
    color:var(--text);
    font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    padding:32px 20px 64px;
  }
  .wrap{max-width:960px;margin:0 auto}
  a{color:var(--primary);text-decoration:none}
  a:hover{text-decoration:underline}

  /* ---------- header ---------- */
  .top{display:flex;align-items:center;gap:14px;margin-bottom:6px}
  .logo{width:34px;height:34px;flex:0 0 auto}
  .brand{font-weight:700;letter-spacing:.2px;font-size:15px;color:var(--text)}
  .brand small{display:block;font-weight:500;color:var(--faint);font-size:11px;letter-spacing:.14em;text-transform:uppercase}
  .head{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;
        padding:22px 0 18px;border-bottom:1px solid var(--line);margin-bottom:22px}
  .head h1{margin:0;font-size:26px;letter-spacing:-.01em}
  .head .sub{color:var(--muted);font-size:14px;margin-top:4px}
  .head .ts{color:var(--faint);font-size:12px;white-space:nowrap}

  /* ---------- headline banner ---------- */
  .headline{display:flex;align-items:center;gap:10px;
    background:linear-gradient(135deg,rgba(0,104,217,.16),rgba(1,122,255,.06));
    border:1px solid rgba(1,122,255,.25);border-radius:var(--radius);
    padding:14px 16px;margin-bottom:24px;font-size:15px;font-weight:600}
  .headline .dot{width:8px;height:8px;border-radius:50%;background:var(--primary);box-shadow:0 0 0 4px rgba(1,122,255,.18)}

  /* ---------- stat tiles ---------- */
  .tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px}
  .tile{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow)}
  .tile .k{color:var(--muted);font-size:12px;letter-spacing:.04em;text-transform:uppercase}
  .tile .v{font-size:24px;font-weight:700;margin-top:6px;letter-spacing:-.01em}
  .tile .v.small{font-size:18px}

  /* ---------- cards / sections ---------- */
  h2.section{font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);
    margin:30px 0 12px;font-weight:600}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:18px 20px;margin-bottom:14px;box-shadow:var(--shadow)}
  .card h3{margin:0 0 10px;font-size:16px}
  .muted{color:var(--muted)}
  p{margin:0 0 12px}
  p:last-child{margin-bottom:0}

  /* ---------- table ---------- */
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:600;font-size:12px;letter-spacing:.04em;text-transform:uppercase}
  tr:last-child td{border-bottom:none}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}

  /* ---------- badges ---------- */
  .badge{display:inline-block;padding:2px 9px;border-radius:999px;font-size:12px;font-weight:600;line-height:1.5}
  .badge.pos{color:#9af4cf;background:rgba(22,199,132,.14);border:1px solid rgba(22,199,132,.3)}
  .badge.neg{color:#ffb3b8;background:rgba(234,57,67,.14);border:1px solid rgba(234,57,67,.3)}
  .badge.warn{color:#ffd98a;background:rgba(240,160,32,.14);border:1px solid rgba(240,160,32,.3)}
  .badge.neutral{color:#c2ccd9;background:rgba(139,151,168,.14);border:1px solid rgba(139,151,168,.3)}
  .pos{color:var(--pos)} .neg{color:var(--neg)} .warn{color:var(--warn)}

  .foot{margin-top:34px;padding-top:16px;border-top:1px solid var(--line);
    color:var(--faint);font-size:12px;display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .foot a{color:var(--faint)}
</style>
</head>
<body>
<div class="wrap">
