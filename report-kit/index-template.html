<!doctype html>
<!--
  Altrady report ARCHIVE template. Regenerated on every report run.
  HOW TO USE (see REPORT-KIT.md): replace {{HISTORY_JSON}} with a JS array literal of all
  history.jsonl records (newest first), then write to ~/altrady-reports/index.html.
  Self-contained — no external CSS/JS. Delete this comment in the generated file.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Altrady Reports</title>
<style>
  :root{
    --bg:#0b0e14;--surface:#121826;--line:rgba(255,255,255,.08);--text:#e6edf3;
    --muted:#8b97a8;--faint:#5b6677;--primary:#017aff;--pos:#16c784;--neg:#ea3943;
    --warn:#f0a020;--radius:14px;--shadow:0 18px 40px -24px rgba(0,0,0,.8);
  }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1200px 600px at 80% -10%,rgba(1,122,255,.10),transparent 60%),var(--bg);
    color:var(--text);font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;padding:32px 20px 64px}
  .wrap{max-width:1000px;margin:0 auto}
  a{color:inherit;text-decoration:none}
  .top{display:flex;align-items:center;gap:14px;margin-bottom:18px}
  .logo{width:34px;height:34px}
  .brand{font-weight:700;font-size:15px}
  .brand small{display:block;font-weight:500;color:var(--faint);font-size:11px;letter-spacing:.14em;text-transform:uppercase}
  .head{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;
    padding-bottom:18px;border-bottom:1px solid var(--line);margin-bottom:20px}
  .head h1{margin:0;font-size:26px;letter-spacing:-.01em}
  .head .count{color:var(--muted);font-size:13px}

  .filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
  .filters input,.filters select{
    background:var(--surface);border:1px solid var(--line);color:var(--text);
    border-radius:10px;padding:9px 12px;font-size:14px;outline:none}
  .filters input:focus,.filters select:focus{border-color:var(--primary)}
  .filters input{flex:1;min-width:180px}

  .row{display:grid;grid-template-columns:150px 1fr auto;gap:14px;align-items:center;
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px 18px;margin-bottom:10px;box-shadow:var(--shadow);transition:border-color .15s,transform .15s}
  .row:hover{border-color:rgba(1,122,255,.4);transform:translateY(-1px)}
  .row .when{color:var(--muted);font-size:13px;font-variant-numeric:tabular-nums}
  .row .when .skill{display:block;color:var(--faint);font-size:11px;letter-spacing:.04em;text-transform:uppercase;margin-top:3px}
  .row .mid .title{font-weight:600;font-size:15px}
  .row .mid .title .mkt{color:var(--primary);font-weight:600}
  .row .mid .headline{color:var(--muted);font-size:13px;margin-top:2px}
  .row .go{color:var(--faint);font-size:20px}
  .empty{color:var(--muted);text-align:center;padding:60px 0}
  .foot{margin-top:30px;color:var(--faint);font-size:12px}
</style>
</head>
<body>

  <div class="head">
    <h1>Report archive</h1>
    <div class="count" id="count"></div>
  </div>

  <div class="filters">
    <input id="q" type="search" placeholder="Search title, market, headline…">
    <select id="skill"></select>
  </div>

  <div id="list"></div>
  <div class="empty" id="empty" style="display:none">No reports yet. Run a skill like “morning check”.</div>

  <div class="foot">Self-contained · generated by Altrady MCP skills.</div>
</div>

<script>
  // Newest first. Replaced on each run.
  const HISTORY = {{HISTORY_JSON}};

  const SKILL_LABELS = {
    "altrady-morning-check":"Morning check","altrady-market-scanner":"Market scan",
    "altrady-backtest-analyzer":"Backtest","altrady-risk-sizer":"Risk sizing",
    "altrady-technical-analysis":"Technical analysis","altrady-trade-review":"Trade review",
    "altrady-watchlist-curator":"Watchlist scan"
  };

  const $ = s => document.querySelector(s);
  const fmtTime = iso => { try{ const d=new Date(iso);
    return d.toLocaleString(undefined,{year:'numeric',month:'short',day:'2-digit',hour:'2-digit',minute:'2-digit'});
  }catch(e){ return iso||''; } };
  const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

  (function(){
    const skills=[...new Set(HISTORY.map(r=>r.skill))].sort();
    const sel=$('#skill'); sel.innerHTML='<option value="">All skills</option>'+
      skills.map(s=>`<option value="${esc(s)}">${esc(SKILL_LABELS[s]||s)}</option>`).join('');
  })();

  function render(){
    const q=$('#q').value.trim().toLowerCase();
    const sk=$('#skill').value;
    const rows=HISTORY.filter(r=>{
      if(sk && r.skill!==sk) return false;
      if(!q) return true;
      return [r.title,r.market,r.headline].filter(Boolean).join(' ').toLowerCase().includes(q);
    });
    $('#count').textContent = rows.length + (rows.length===1?' report':' reports');
    $('#empty').style.display = rows.length?'none':'block';
    $('#list').innerHTML = rows.map(r=>`
      <a class="row" href="${esc(r.file)}">
        <div class="when">${fmtTime(r.timestamp)}<span class="skill">${esc(SKILL_LABELS[r.skill]||r.skill)}</span></div>
        <div class="mid">
          <div class="title">${esc(r.title)}${r.market?` · <span class="mkt">${esc(r.market)}</span>`:''}</div>
          <div class="headline">${esc(r.headline)}</div>
        </div>
        <div class="go">›</div>
      </a>`).join('');
  }
  $('#q').addEventListener('input',render);
  $('#skill').addEventListener('change',render);
  render();
</script>
</body>
</html>
